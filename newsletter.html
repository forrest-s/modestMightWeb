<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="canonical" href="https://www.modestmightweb.com/newsletter">

    <meta name="description" content="Subscribe to the Modest Might Web newsletter for tips on building fast, effective websites for small businesses in Central Oregon.">
    <meta name="robots" content="noindex">

    <!--Social Media-->
    <meta property="og:title" content="Newsletter | Modest Might Web">
    <meta property="og:description" content="Subscribe to the Modest Might Web newsletter for tips on building fast, effective websites for small businesses.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.modestmightweb.com/newsletter">
    <meta property="og:image" content="https://www.modestmightweb.com/assets/images/social.jpg">

    <!--Favicons-->
    <link rel="icon" type="image/x-icon" href="/assets/favicons/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/assets/favicons/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="/assets/favicons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png">
    <link rel="manifest" href="/assets/favicons/site.webmanifest">
    <meta name="apple-mobile-web-app-title" content="Modest Might Web">
    <meta name="theme-color" content="#2D4A3E">

    <!--Preload-->
    <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/roboto-v29-latin-regular.woff2" crossorigin>
    <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/roboto-v29-latin-700.woff2" crossorigin>
    <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/roboto-v29-latin-900.woff2" crossorigin>

    <!--Styles-->
    <link rel="stylesheet" href="/css/core-styles.css">
    <link rel="stylesheet" href="/css/newsletter.css">
    <link rel="stylesheet" href="/css/dark.css">

    <!--Scripts-->
    <script src="/components/page-header.js" defer></script>
    <script src="/components/page-footer.js" defer></script>
    <script src="/assets/js/contact.js" defer></script>

    <title>Newsletter | Modest Might Web</title>
</head>
<body>
    <page-header></page-header>
    
    <main id="main">
        <!-- ============================================ -->
        <!--                   Banner                     -->
        <!-- ============================================ -->

        <div id="banner-712">
            <div class="cs-container">
                <span class="cs-int-title">Subscribe</span>
            </div>
            <!--Background Image-->
            <picture class="cs-background">
                <!--Mobile Image-->
                <source media="(max-width: 600px)" srcset="assets/images/mountain_1.webp">
                <!--Tablet and above Image-->
                <source media="(min-width: 601px)" srcset="assets/images/mountain_1.webp">
                <img loading="lazy" decoding="async" src="assets/images/mountain_1.webp" alt="mountain" width="1280" height="568" aria-hidden="true">
            </picture>
        </div>
    
        <!-- ============================================ -->
        <!--                Subscribe                     -->
        <!-- ============================================ -->

        <section id="RTsbs-459">
            <div class="cs-container">
                <div id="contact-1388" class="cs-content">
                    <form class="cs-form" id="cs-form-1388" name="Contact Form" method="post">
                        <h3 class="cs-h3">Subscribe</h3>
                        <label class="cs-label">
                            Name
                            <input class="cs-input" required type="text" id="name-1388" name="name" placeholder="Name">
                        </label>
                        <label class="cs-label cs-email">
                            Email
                            <input class="cs-input" required type="email" id="email-1388" name="email" placeholder="Email">
                        </label>
                        <label class="cs-label">
                            Username
                            <input class="cs-input" required type="text" id="username-1388" name="username" placeholder="Username">
                        </label>
                        <button class="cs-button-solid cs-submit" type="submit">Subscribe</button>
                        <p id="subscribe-request-status" aria-live="polite"></p>
                    </form>
                </div>
                <picture class="cs-picture">
                    <source media="(max-width: 600px)" srcset="/assets/images/subscribe.webp">
                    <source media="(min-width: 601px)" srcset="/assets/images/subscribe.webp">
                    <img aria-hidden="true" loading="lazy" decoding="async" src="/assets/images/subscribe.webp" alt="grass" width="649" height="617">
                </picture>
            </div>
        </section>
                                        
        <!-- ============================================ -->
        <!--             Unsubscribe                      -->
        <!-- ============================================ -->

        <section id="RTsbsr-459">
            <div class="cs-container">
                <div id="contact-1388" class="cs-content">
                    <form class="cs-form" id="unsubscribe-request-form">
                        <h3 class="cs-h3">Unsubscribe</h3>
                        <label class="cs-label">
                            Email
                            <input class="cs-input" required type="email" id="unsubscribe-email" placeholder="Enter your email">
                        </label>
                        <button id="unsubscribe-btn" class="cs-button-solid cs-submit" type="submit">Send Unsubscribe Link</button>
                        <p id="unsubscribe-request-status" aria-live="polite"></p>
                    </form>
                </div>
                <picture class="cs-picture">
                    <source media="(max-width: 600px)" srcset="/assets/images/unsubscribe.webp">
                    <source media="(min-width: 601px)" srcset="/assets/images/unsubscribe.webp">
                    <img aria-hidden="true" loading="lazy" decoding="async" src="/assets/images/unsubscribe.webp" alt="grass" width="649" height="617">
                </picture>
            </div>
        </section>                                       
    </main>

    <page-footer></page-footer>
</body>
</html>
