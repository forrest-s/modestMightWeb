<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="/components/page-header.js" defer></script>
    <script src="/components/page-footer.js" defer></script>
    <link rel="stylesheet" href="/css/style.css">

    <script src="assets/js/unsubscribe.js" defer></script>
</head>
<body>
    <page-header></page-header>
    <main id="main">
        <!-- ============================================ -->
        <!--                   Banner                     -->
        <!-- ============================================ -->

        <div id="banner-712">
            <div class="cs-container">
                <span class="cs-int-title">Unsubscribe</span>
            </div>
            <!--Background Image-->
            <picture class="cs-background">
                <!--Mobile Image-->
                <source media="(max-width: 600px)" srcset="/assets/images/mountain_1.webp">
                <!--Tablet and above Image-->
                <source media="(min-width: 601px)" srcset="/assets/images/mountain_1.webp">
                <img loading="lazy" decoding="async" src="/assets/images/mountain_1.webp" alt="mountain" width="1280" height="568" aria-hidden="true">
            </picture>
        </div>

        <section class="cs-container" id="unsubscribe-wrap">
            <h1>Unsubscribe</h1>
            <p>Enter your email address below to confirm your unsubscribe request.</p>
            <label class="cs-label">
                Email
                <input class="cs-input" type="email" id="unsubscribe-email" placeholder="Enter your email" required>
            </label>
            <button id="unsubscribe-btn" class="cs-button-solid">Unsubscribe</button>
            <p id="unsubscribe-status" aria-live="polite"></p>
        </section>
    </main>
    <page-footer></page-footer>
</body>
</html>
